schema_version: 1
id: inverse-smoke-control
version: 1.0.0
status: benchmark-ready
paper_id: stable-fluids
capsule:
  title: "Inverse Smoke-Control Research Challenge"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "fluid dynamics"
    - "computer graphics"
    - "optimal control"
  research_types:
    - "proxy-reproduction"
    - "simulation-physics"
    - "comparative-method"
    - "visual-graphics"
  verification_forms:
    - "end-to-end artifact"
    - "comparative advantage"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      The stable semi-Lagrangian fluid mechanism is fixed while agents optimize compact control sequences.
    transfer_argument: >-
      The stable semi-Lagrangian fluid mechanism is fixed while agents optimize compact control sequences.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Robust target-match score"
    direction: higher-is-better
    unit: "normalized similarity"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Lower control energy, then faster optimization."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - control-format
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying target-match score under hidden perturbations wins.
