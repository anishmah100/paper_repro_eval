schema_version: 1
id: competitive-editing
version: 1.0.0
status: benchmark-ready
paper_id: poisson-image-editing
capsule:
  title: "Competitive Poisson Editing Laboratory"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "computer graphics"
    - "computer vision"
    - "partial differential equations"
  research_types:
    - "visual-graphics"
    - "exact-mathematical"
    - "comparative-method"
    - "software-conformance"
  verification_forms:
    - "numerical agreement"
    - "properties/invariants"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: faithful-scale-reduced
    rationale: >-
      The discrete optimization, guidance fields, and boundary conditions are reproduced exactly on smaller images.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Hidden editing quality"
    direction: higher-is-better
    unit: "normalized quality"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - build-and-artifacts
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying hidden-case quality wins; scores within the declared tolerance remain tied.
