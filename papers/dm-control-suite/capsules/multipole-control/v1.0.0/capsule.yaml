schema_version: 1
id: multipole-control
version: 1.0.0
status: benchmark-ready
paper_id: dm-control-suite
capsule:
  title: "Progressive Multi-Pole Control"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "reinforcement learning"
    - "control"
    - "robotics"
    - "simulation"
  research_types:
    - "small-training"
    - "simulation-physics"
    - "comparative-method"
    - "systems-engineering"
  verification_forms:
    - "end-to-end artifact"
    - "comparative advantage"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      A compact deterministic cart/multi-pole kernel tests persistent feedback control across hidden dynamics.
    transfer_argument: >-
      The proxy preserves coupled unstable control, changing system dimension, disturbances, deadlines, and visual rollouts.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Compact multi-pole survival quality"
    direction: higher-is-better
    unit: "normalized return"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - agent-protocol
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying survival-and-uprightness score across hidden compact dynamics wins.
