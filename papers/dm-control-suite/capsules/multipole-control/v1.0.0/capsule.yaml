schema_version: 1
id: multipole-control
version: 1.0.0
status: draft
paper_id: dm-control-suite
capsule:
  title: "Progressive Multi-Pole Control"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "reinforcement learning"
    - "control"
    - "robotics"
    - "simulation"
  research_types:
    - "small-training"
    - "simulation-physics"
    - "comparative-method"
    - "systems-engineering"
  verification_forms:
    - "end-to-end artifact"
    - "comparative advantage"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: full-fidelity
    rationale: >-
      The upstream MuJoCo model procedurally generates the evaluated linked-pole systems.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - Difficulty and score weights require pilot calibration before promotion.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Robust multi-pole return"
    direction: higher-is-better
    unit: "normalized return"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Higher hardest-level success, then lower control energy."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - agent-protocol
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying aggregate return across the hidden control ladder wins.
