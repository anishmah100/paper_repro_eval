schema_version: 1
id: morphology-control-codesign
version: 1.0.0
status: benchmark-ready
paper_id: evolutionary-soft-robots
capsule:
  title: "Soft-Robot Morphology and Control Co-Design"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "robotics"
    - "evolutionary computation"
    - "embodied intelligence"
  research_types:
    - "proxy-reproduction"
    - "small-training"
    - "simulation-physics"
    - "comparative-method"
  verification_forms:
    - "comparative advantage"
    - "statistical agreement"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      A compact connected-voxel and terrain-conditioned oscillator objective tests morphology/controller parameter co-design.
    transfer_argument: >-
      A compact connected-voxel and terrain-conditioned oscillator objective tests morphology/controller parameter co-design.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Terrain-conditioned co-design proxy quality"
    direction: higher-is-better
    unit: "normalized distance-energy score"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - design-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying terrain-conditioned morphology/oscillator proxy score wins.
