schema_version: 1
id: progressive-path-tracer
version: 1.0.0
status: draft
paper_id: multiple-importance-sampling
capsule:
  title: "Progressive Competitive Path Tracer"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "computer graphics"
    - "Monte Carlo methods"
    - "rendering"
  research_types:
    - "visual-graphics"
    - "algorithmic-property"
    - "systems-engineering"
    - "comparative-method"
  verification_forms:
    - "statistical agreement"
    - "software conformance"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: faithful-scale-reduced
    rationale: >-
      The MIS estimators are evaluated exactly on smaller canonical scenes and finite ray budgets.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - Difficulty and score weights require pilot calibration before promotion.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Equal-time render quality"
    direction: higher-is-better
    unit: "normalized image quality"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Lower measured bias, then higher samples per second."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - render-correctness
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying equal-time image-quality score across hidden scenes wins.
