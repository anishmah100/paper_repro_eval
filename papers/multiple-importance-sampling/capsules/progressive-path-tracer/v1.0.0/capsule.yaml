schema_version: 1
id: progressive-path-tracer
version: 1.0.0
status: benchmark-ready
paper_id: multiple-importance-sampling
capsule:
  title: "Progressive Competitive Path Tracer"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "computer graphics"
    - "Monte Carlo methods"
    - "rendering"
  research_types:
    - "visual-graphics"
    - "algorithmic-property"
    - "systems-engineering"
    - "comparative-method"
  verification_forms:
    - "statistical agreement"
    - "software conformance"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      Small procedural scenes test correct image synthesis and rendering-software packaging.
    transfer_argument: >-
      The proxy preserves scene parsing, deterministic image formation, hidden geometry, runtime, and visual error inspection, but does not verify an MIS estimator.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Hidden-scene image reconstruction quality"
    direction: higher-is-better
    unit: "normalized image quality"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - render-correctness
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying image-reconstruction quality across hidden procedural scenes wins.
