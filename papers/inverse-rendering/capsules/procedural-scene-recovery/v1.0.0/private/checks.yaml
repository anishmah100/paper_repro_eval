    title: "Produces a valid portable scene"
    kind: objective
    weight: 0.1
    depends_on: []
  - id: observed-view-fit
    title: "Matches supplied observations"
    kind: objective
    weight: 0.2
    depends_on:
      - scene-validity
  - id: heldout-view-quality
    title: "Reconstructs hidden camera views"
    kind: objective
    weight: 0.4
    depends_on:
      - scene-validity
  - id: geometry-and-consistency
    title: "Recovers coherent geometry and materials"
    kind: objective
    weight: 0.2
    depends_on:
      - scene-validity
  - id: recovery-efficiency
    title: "Uses the evaluation budget efficiently"
    kind: objective
    weight: 0.1
    depends_on:
      - scene-validity
  - id: review-artifacts
    title: Human-review evidence is complete
    kind: diagnostic
    weight: 0
    depends_on: []
