schema_version: 1
arena: topology
positive_reference_passes: true
repeatability_checked: true
mutants:
  - malformed-output
  - plausible-algorithmic-error
assertions:
  - malformed output scores zero
  - private frontier exceeds the public baseline by at least 0.015
  - private frontier exceeds the plausible mutant by at least 0.015
hidden_case_coverage:
  - nominal hidden seed
  - shifted hidden seed
  - ceiling-difficulty hidden seed
commands:
  - uv run python authoring/calibrate_arenas.py
  - uv run python authoring/smoke_arenas.py
