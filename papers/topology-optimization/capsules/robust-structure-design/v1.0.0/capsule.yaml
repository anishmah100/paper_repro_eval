schema_version: 1
id: robust-structure-design
version: 1.0.0
status: draft
paper_id: topology-optimization
capsule:
  title: "Robust Topology-Optimization Challenge"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "applied mathematics"
    - "finite elements"
    - "optimization"
    - "mechanical design"
  research_types:
    - "exact-mathematical"
    - "comparative-method"
    - "visual-graphics"
    - "systems-engineering"
  verification_forms:
    - "numerical agreement"
    - "properties/invariants"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: faithful-scale-reduced
    rationale: >-
      The SIMP finite-element objective and constraints are reproduced on compact grids with additional held-out loads.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - Difficulty and score weights require pilot calibration before promotion.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Robust constrained compliance"
    direction: higher-is-better
    unit: "normalized structural score"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Lower worst-case compliance, then faster solve."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - solver-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest feasible robust structural score across hidden load cases wins.
