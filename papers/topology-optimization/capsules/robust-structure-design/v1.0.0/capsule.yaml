schema_version: 1
id: robust-structure-design
version: 1.0.0
status: benchmark-ready
paper_id: topology-optimization
capsule:
  title: "Robust Topology-Optimization Challenge"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "applied mathematics"
    - "finite elements"
    - "optimization"
    - "mechanical design"
  research_types:
    - "exact-mathematical"
    - "comparative-method"
    - "visual-graphics"
    - "systems-engineering"
  verification_forms:
    - "numerical agreement"
    - "properties/invariants"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      A compact density-grid objective tests connected constrained load-path design under hidden loads.
    transfer_argument: >-
      The proxy preserves spatial material allocation, connectivity, load alignment, volume constraints, hidden cases, and visual inspection, but not finite-element compliance.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Connected constrained load-path quality"
    direction: higher-is-better
    unit: "normalized structural score"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - solver-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest feasible connectivity-and-load-alignment score across hidden cases wins.
