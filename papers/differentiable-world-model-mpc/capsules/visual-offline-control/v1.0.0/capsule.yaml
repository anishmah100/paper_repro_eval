schema_version: 1
id: visual-offline-control
version: 1.0.0
status: benchmark-ready
paper_id: differentiable-world-model-mpc
capsule:
  title: "Visual Offline World-Model Control"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "reinforcement learning"
    - "world models"
    - "optimal control"
  research_types:
    - "proxy-reproduction"
    - "small-training"
    - "simulation-physics"
    - "comparative-method"
  verification_forms:
    - "comparative advantage"
    - "statistical agreement"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      The paper's inference-time differentiable planning mechanism is tested on a compact visual control system.
    transfer_argument: >-
      The paper's inference-time differentiable planning mechanism is tested on a compact visual control system.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Realized robust control score"
    direction: higher-is-better
    unit: "normalized return"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Higher landing/docking success, then lower fuel use."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - controller-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying realized return on hidden true dynamics wins.
