schema_version: 1
id: multimaterial-simulator
version: 1.0.0
status: benchmark-ready
paper_id: mls-mpm
capsule:
  title: "Competitive Multi-Material MLS-MPM Simulator"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "computer graphics"
    - "continuum mechanics"
    - "simulation"
  research_types:
    - "simulation-physics"
    - "visual-graphics"
    - "software-conformance"
    - "comparative-method"
  verification_forms:
    - "properties/invariants"
    - "numerical agreement"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: faithful-scale-reduced
    rationale: >-
      The transfers and constitutive updates are reproduced on smaller real-time two-dimensional scenes.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Physical fidelity and scene coverage"
    direction: higher-is-better
    unit: "normalized fidelity"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers:
    - id: declared_tiebreakers
      title: "Higher hardest-material level, then simulation throughput."
      direction: higher-is-better
      unit: task-specific raw metrics
      description: Applied in the order documented by the private verifier.
  qualification_checks:
    - simulation-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying physical-fidelity score across hidden material scenes wins.
