schema_version: 1
id: multimaterial-simulator
version: 1.0.0
status: benchmark-ready
paper_id: mls-mpm
capsule:
  title: "Competitive Multi-Material MLS-MPM Simulator"
  summary: >-
    A visually inspectable reproduction plus an open competitive extension with hidden cases.
  domains:
    - "computer graphics"
    - "continuum mechanics"
    - "simulation"
  research_types:
    - "simulation-physics"
    - "visual-graphics"
    - "software-conformance"
    - "comparative-method"
  verification_forms:
    - "properties/invariants"
    - "numerical agreement"
    - "visual/interactive"
    - "competitive score"
  fidelity:
    level: proxy
    rationale: >-
      A compact particle dynamics kernel tests deterministic material-conditioned trajectory reproduction.
    transfer_argument: >-
      The proxy preserves particle state, material-dependent behavior, stability, hidden initial conditions, trajectory comparison, and visual replay, but not full MLS-MPM transfers.
    limitations:
      - The compact local arena does not reproduce the source paper's largest experiments.
      - This local calibration does not establish that the private reference is globally optimal.
submission:
  reproduce: submission/reproduce.sh
  report: submission/REPORT.md
  demo: submission/demo.sh
competition:
  mode: independent-score
  primary_metric:
    id: objective_score
    title: "Hidden material-trajectory fidelity"
    direction: higher-is-better
    unit: "normalized fidelity"
    description: Weighted normalized score produced from trusted hidden evaluation.
  tiebreakers: []
  qualification_checks:
    - simulation-validity
  tie_tolerance: 0.001
  winner_rule: >-
    Highest qualifying full-trajectory fidelity across hidden material scenes wins.
